          - Next Gen Team — authored Terraform scripts to manage infrastructure-as-code across Azure, AWS, and on-premises, enabling teams to deploy consistent, repeatable infrastructure. Built Grafana dashboards using Kusto queries providing real-time visibility into deployed IaC and cloud costs against budgets.
